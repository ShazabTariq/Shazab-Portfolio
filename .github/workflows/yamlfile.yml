name: Docker CI/CD

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio:latest .
         

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio:latest
         
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          cache-from: none
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/portfolio:latest
          labels: type=portfolio

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to VM
        run: |
          ssh -o StrictHostKeyChecking=no mate@35.224.82.70 << 'EOF'
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio:latest
             docker stop myportfolio || true
             docker rm myportfolio || true
           docker run -d -p 3030:3000 --name myportfolio ${{ secrets.DOCKER_USERNAME }}/portfolio:latest
          EOF